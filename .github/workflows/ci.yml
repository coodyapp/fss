name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  cli:
    name: CLI — lint, test, self-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check (dash = Debian /bin/sh)
        run: |
          for f in apps/cli/bin/fss apps/cli/lib/*.sh apps/cli/test/run-tests.sh; do
            dash -n "$f"
            bash -n "$f"
          done

      - name: ShellCheck
        run: shellcheck -s sh apps/cli/bin/fss apps/cli/lib/*.sh apps/cli/test/run-tests.sh

      - name: Run tests (dash)
        run: dash apps/cli/test/run-tests.sh

      - name: Run tests (bash)
        run: bash apps/cli/test/run-tests.sh

      - name: Self-scan (dogfood, hermetic HOME)
        run: HOME="$(mktemp -d)" apps/cli/bin/fss scan .
