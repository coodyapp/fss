name: Deploy www

on:
  push:
    branches: [main]
    paths:
      - 'apps/www/**'
      - '.github/workflows/deploy-www.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-www
  cancel-in-progress: false

jobs:
  deploy:
    name: Cloudflare Pages — coody-fss-www-prd-01
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://fss.coody.app
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy apps/www/public --project-name coody-fss-www-prd-01
