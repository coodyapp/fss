name: Deploy www

on:
  push:
    branches: [main]
    paths:
      - 'apps/www/**'
      - '.github/workflows/deploy-www.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-www
  cancel-in-progress: false

jobs:
  deploy:
    name: Cloudflare Pages — coody-fss-www-prd-01
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://fss.coody.app
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy apps/www/public --project-name coody-fss-www-prd-01

      # Idempotent: attaches fss.coody.app to the Pages project and ensures the
      # CNAME record exists. "Already exists" responses are treated as success;
      # missing token permissions warn instead of failing the deploy.
      - name: Ensure custom domain fss.coody.app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT: coody-fss-www-prd-01
          DOMAIN: fss.coody.app
          ZONE_NAME: coody.app
        run: |
          api() {
            curl -sS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                 -H "Content-Type: application/json" "$@"
          }

          echo "::group::Attach domain to Pages project"
          resp=$(api -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJECT/domains" \
            --data "{\"name\":\"$DOMAIN\"}")
          if echo "$resp" | jq -e '.success' >/dev/null; then
            echo "domain attached"
          elif echo "$resp" | jq -e '.errors[]?.code == 8000015 or (.errors[]?.message | test("already"))' >/dev/null; then
            echo "domain already attached"
          else
            echo "::warning::could not attach domain: $(echo "$resp" | jq -c '.errors')"
          fi
          echo "::endgroup::"

          echo "::group::Ensure CNAME record"
          zone_id=$(api "https://api.cloudflare.com/client/v4/zones?name=$ZONE_NAME" | jq -r '.result[0].id // empty')
          if [ -z "$zone_id" ]; then
            echo "::warning::zone $ZONE_NAME not visible to this token; create the CNAME manually"
            exit 0
          fi
          existing=$(api "https://api.cloudflare.com/client/v4/zones/$zone_id/dns_records?type=CNAME&name=$DOMAIN" | jq -r '.result | length')
          if [ "$existing" -gt 0 ]; then
            echo "CNAME already exists"
            exit 0
          fi
          resp=$(api -X POST "https://api.cloudflare.com/client/v4/zones/$zone_id/dns_records" \
            --data "{\"type\":\"CNAME\",\"name\":\"$DOMAIN\",\"content\":\"$PROJECT.pages.dev\",\"proxied\":true}")
          if echo "$resp" | jq -e '.success' >/dev/null; then
            echo "CNAME created: $DOMAIN -> $PROJECT.pages.dev"
          else
            echo "::warning::could not create CNAME: $(echo "$resp" | jq -c '.errors')"
          fi
          echo "::endgroup::"
