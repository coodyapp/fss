name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify CLI version matches tag
        run: |
          expected="${GITHUB_REF_NAME#v}"
          actual="$(grep -oE 'FSS_VERSION="[0-9]+\.[0-9]+\.[0-9]+"' apps/cli/lib/common.sh | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          if [[ "$actual" != "$expected" ]]; then
            echo "::error::apps/cli/lib/common.sh FSS_VERSION ($actual) does not match tag ($expected)"
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
