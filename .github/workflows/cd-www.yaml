name: CD — WWW

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/www/**'
      - 'apps/cli/lib/common.sh'
      - 'install.sh'
      - 'pnpm-lock.yaml'
      - '.github/workflows/cd-www.yaml'

concurrency:
  group: cd-www
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    environment:
      name: prd
      url: https://fss.coody.app

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build www (prd)
        run: pnpm --filter www build

      - name: Deploy Worker (prd)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/www
          command: deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
